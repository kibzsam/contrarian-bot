version: "3.8"

services:
  ai-contrarian-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-contrarian-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

# Note: For local testing, use default bridge network.
# For VPS with Dokploy, uncomment networks section below:
# networks:
#   dokploy-network:
#     external: true
